gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Tamaño máximo para descarga de PDFs
    client_max_body_size 50m;

    # Headers de seguridad básicos
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # noVNC BCP — ^~ evita que el regex de assets estáticos intercepte JS/CSS del proxy
    location ^~ /vnc/bcp/ {
        proxy_pass http://selenium-bcp:7900/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # noVNC BBVA — ^~ evita que el regex de assets estáticos intercepte JS/CSS del proxy
    location ^~ /vnc/bbva/ {
        proxy_pass http://selenium-bbva:7900/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # noVNC IBK — ^~ evita que el regex de assets estáticos intercepte JS/CSS del proxy
    location ^~ /vnc/ibk/ {
        proxy_pass http://selenium-ibk:7900/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # noVNC Scotiabank
    location ^~ /vnc/scotiabank/ {
        proxy_pass http://selenium-scotiabank:7900/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # WebSocket: camera relay y otros WS de la API
    location /ws/ {
        proxy_pass http://api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SSE y streaming: sin buffering en rutas de API
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Assets estáticos con caché
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: todas las rutas apuntan a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
