x-selenium-common: &selenium-common
  image: selenium/standalone-chrome:latest
  shm_size: 3gb
  environment: &selenium-env
    TZ: "America/Lima"
    SE_VNC_PASSWORD: ${VNC_PASSWORD:-rpa123}
    SE_NODE_MAX_SESSIONS: "1"
    SE_SCREEN_WIDTH: "1920"
    SE_SCREEN_HEIGHT: "1080"
    SE_START_XVFB: "true"
    SE_NODE_SESSION_TIMEOUT: "86400"
    SE_SESSION_REQUEST_TIMEOUT: "86400"
    SE_SCREEN_KEYBOARD_LAYOUT: "latam"
    # caps:none desactiva Caps Lock como tecla de bloqueo.
    # Esto elimina el problema de desincronizacion de estado entre el cliente noVNC
    # y el servidor X11, que causaba que Caps Lock y Shift se comportaran de forma
    # impredecible. Para mayusculas usar Shift (funciona siempre en noVNC).
    SE_SCREEN_KEYBOARD_OPTIONS: "caps:none"
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 30s

services:
  selenium-bcp:
    <<: *selenium-common
    container_name: rpa_chrome_bcp
    ports:
      - "7901:7900"   # noVNC BCP 1
    volumes:
      - downloads_bcp1:/home/seluser/Downloads

  selenium-bcp2:
    <<: *selenium-common
    container_name: rpa_chrome_bcp2
    ports:
      - "7905:7900"   # noVNC BCP 2
    volumes:
      - downloads_bcp2:/home/seluser/Downloads

  selenium-bbva:
    <<: *selenium-common
    container_name: rpa_chrome_bbva
    ports:
      - "7902:7900"   # noVNC BBVA
    volumes:
      - downloads_bbva:/home/seluser/Downloads

  selenium-ibk:
    <<: *selenium-common
    container_name: rpa_chrome_ibk
    ports:
      - "7903:7900"   # noVNC IBK
    volumes:
      - downloads_ibk:/home/seluser/Downloads

  selenium-scotiabank:
    <<: *selenium-common
    container_name: rpa_chrome_scotiabank
    ports:
      - "7904:7900"   # noVNC Scotiabank
    volumes:
      - downloads_scotiabank:/home/seluser/Downloads

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rpa_api
    expose:
      - "8000"
    env_file: .env
    environment:
      TZ: "America/Lima"
      SELENIUM_GRID_URL_BCP:        http://selenium-bcp:4444
      SELENIUM_GRID_URL_BCP2:       http://selenium-bcp2:4444
      SELENIUM_GRID_URL_BBVA:       http://selenium-bbva:4444
      SELENIUM_GRID_URL_IBK:        http://selenium-ibk:4444
      SELENIUM_GRID_URL_SCOTIABANK: http://selenium-scotiabank:4444
    volumes:
      - downloads_bcp1:/app/downloads/bcp1
      - downloads_bcp2:/app/downloads/bcp2
      - downloads_bbva:/app/downloads/bbva
      - downloads_ibk:/app/downloads/ibk
      - downloads_scotiabank:/app/downloads/scotiabank
    restart: unless-stopped
    depends_on:
      selenium-bcp:
        condition: service_healthy
      selenium-bcp2:
        condition: service_healthy
      selenium-bbva:
        condition: service_healthy
      selenium-ibk:
        condition: service_healthy
      selenium-scotiabank:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: rpa_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    depends_on:
      - api

volumes:
  downloads_bcp1:
  downloads_bcp2:
  downloads_bbva:
  downloads_ibk:
  downloads_scotiabank:
